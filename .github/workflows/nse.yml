name: NSE Volume Gainers

on:
  schedule:
    - cron: '30 4 * * 1-5'   # 10:00 AM IST (Mon-Fri)
    - cron: '45 9 * * 1-5'   # 3:15 PM IST (Mon-Fri)
  workflow_dispatch:           # Manual trigger for testing

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pytz

      - name: Run morning scan
        if: github.event.schedule == '30 4 * * 1-5'
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SCAN_TYPE: morning
        run: python nse_gainers.py

      - name: Run evening scan
        if: github.event.schedule == '45 9 * * 1-5'
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SCAN_TYPE: evening
        run: python nse_gainers.py
