name: NSE Volume Gainers

on:
  schedule:
    - cron: '30 4 * * 1-5'
    - cron: '45 9 * * 1-5'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan type'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pytz

      - name: Run scan
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SCAN_TYPE: ${{ github.event.inputs.scan_type || (github.event.schedule == '30 4 * * 1-5' && 'morning') || 'evening' }}
        run: python nse_gainers.py
