name: NSE Volume Gainers

on:
  schedule:
    - cron: '15 4 * * 1-5'
    - cron: '40 9 * * 1-5'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan type'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pytz

      - name: Restore morning data cache
        uses: actions/cache@v3
        with:
          path: morning_data.json
          key: morning-data-${{ github.run_id }}
          restore-keys: morning-data-

      - name: Run scan
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SCAN_TYPE: ${{ github.event.inputs.scan_type || (github.event.schedule == '15 4 * * 1-5' && 'morning') || 'evening' }}
        run: python nse_gainers.py

      - name: Save morning data cache
        if: env.SCAN_TYPE == 'morning' || github.event.inputs.scan_type == 'morning'
        uses: actions/cache@v3
        with:
          path: morning_data.json
          key: morning-data-${{ github.run_id }}
